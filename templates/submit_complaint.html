{% extends 'layout.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="card shadow-sm border-0 mt-4">
            <div class="card-header bg-white border-bottom-0 pt-4 pb-0 text-center">
                <h3 class="text-primary fw-bold">Submit a Grievance</h3>
                <p class="text-muted">Fill out the form below carefully so admin can help you quickly.</p>
            </div>
            <div class="card-body p-4">
                <form method="POST" action="">
                    <div class="mb-3">
                        <label class="form-label text-muted fw-bold">Select Category</label>
                        <select name="category" class="form-select form-select-lg" required>
                            <option value="">Choose a category...</option>
                            <option value="Academic">Academic (Exams, Results, Books)</option>
                            <option value="Hostel">Hostel (Rooms, Mess, Cleaning)</option>
                            <option value="Infrastructure">Infrastructure (AC, Benches, Lights)</option>
                            <option value="Administration">Administration (Fees, Identity Card)</option>
                            <option value="Others">Others</option>
                        </select>
                    </div>
                    <div class="mb-4">
                        <label class="form-label text-muted fw-bold">Detailed Description</label>
                        <textarea name="description" class="form-control" rows="5" placeholder="Explain your issue clearly here..." required></textarea>
                    </div>
                    <div class="d-flex gap-2">
                        <a href="{{ url_for('dashboard') }}" class="btn btn-light border btn-lg w-50">Cancel</a>
                        <button type="submit" class="btn btn-success btn-lg w-50 shadow-sm">Submit Complaint</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
