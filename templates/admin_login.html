{% extends 'layout.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-lg border-0 mt-5 border-top border-5 border-danger">
            <div class="card-body p-4">
                <div class="text-center mb-4">
                    <h1 style="font-size: 3.5rem;">🛡️</h1>
                    <h3 class="mt-2 text-danger fw-bold">Admin Security Portal</h3>
                    <p class="text-muted">Only authorized staff may proceed</p>
                </div>
                <form method="POST" action="">
                    <div class="mb-3">
                        <label class="form-label fw-bold text-muted">Admin Email Address</label>
                        <input type="email" name="email" class="form-control form-control-lg" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold text-muted">Secure Password</label>
                        <input type="password" name="password" class="form-control form-control-lg" required>
                    </div>
                    <button type="submit" class="btn btn-danger btn-lg w-100 mt-3 shadow-sm">Secure Login</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
